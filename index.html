<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
</head>
<body>
  <div class="app">
    <aside class="category-panel">
      <div class="category-panel-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span>IPTV</span>
      </div>
      <div class="category-list" id="categoryList"></div>
    </aside>

    <aside class="sidebar">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search channels..." autocomplete="off" tabindex="0">
      </div>
      <div class="channel-list" id="channelList"></div>
    </aside>

    <main class="player-section">
      <div class="video-container" id="videoContainer" tabindex="0">
        <video id="video" playsinline crossorigin="anonymous" tabindex="-1"></video>
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <p class="placeholder-title">Select a channel</p>
          <p class="hint">↑↓ Browse &nbsp;·&nbsp; Enter Select &nbsp;·&nbsp; Ch+/Ch− Switch</p>
        </div>
        <div class="loading" id="loading">
          <div class="spinner">
            <div class="spinner-ring"></div>
          </div>
          <p>Loading stream...</p>
        </div>
        <div class="error" id="error"></div>
        <div class="channel-toast" id="channelToast"></div>
        <div class="video-controls" id="videoControls">
          <button class="ctrl-btn" id="btnChPrev" title="Previous channel" tabindex="0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn btn-play" id="btnPlayPause" title="Play / Pause" tabindex="0">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="ctrl-btn" id="btnChNext" title="Next channel" tabindex="0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="btnFullscreen" title="Fullscreen" tabindex="0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
      <div class="now-playing" id="nowPlaying"></div>
    </main>
  </div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
