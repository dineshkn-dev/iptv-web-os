<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Indian IPTV | M3U Player</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>IPTV Player</h1>
    </header>

    <main class="main">
      <aside class="category-panel">
        <div class="category-list" id="categoryList"></div>
      </aside>
      <aside class="sidebar">
        <div class="search-box">
          <input type="text" id="search" placeholder="Search channels..." autocomplete="off" tabindex="0">
        </div>
        <div class="channel-list" id="channelList"></div>
      </aside>

      <section class="player-section">
        <div class="video-container" id="videoContainer" tabindex="0">
          <video id="video" playsinline crossorigin="anonymous" tabindex="-1"></video>
          <div class="placeholder" id="placeholder">
            <p>Select a channel to start watching</p>
            <p class="hint">Use ↑↓ to browse • Enter to select • Ch+ / Ch− to switch</p>
          </div>
          <div class="loading" id="loading">
            <span class="spinner"></span>
            <p>Loading...</p>
          </div>
          <div class="error" id="error"></div>
          <div class="channel-toast" id="channelToast"></div>
          <div class="video-controls" id="videoControls">
            <button class="ctrl-btn" id="btnChPrev" title="Previous channel (Ch−)" tabindex="0">Ch−</button>
            <button class="ctrl-btn" id="btnPlayPause" title="Play / Pause" tabindex="0">▶ / ⏸</button>
            <button class="ctrl-btn" id="btnChNext" title="Next channel (Ch+)" tabindex="0">Ch+</button>
            <button class="ctrl-btn" id="btnFullscreen" title="Fullscreen" tabindex="0">⛶</button>
          </div>
        </div>
        <div class="now-playing" id="nowPlaying"></div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
