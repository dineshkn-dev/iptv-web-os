<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Indian IPTV | M3U Player</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>IPTV Player</h1>
      <div class="playlist-selector">
        <label for="playlist">Playlist:</label>
        <select id="playlist">
          <optgroup label="South Indian">
            <option value="south-indian">South Indian Channels</option>
          </optgroup>
          <optgroup label="Sports">
            <option value="sports-all">Sports – All Channels</option>
            <option value="sports-m3u">Sports – M3U Channels</option>
            <option value="sports-being">Sports – Being Sports</option>
          </optgroup>
        </select>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <div class="search-box">
          <input type="text" id="search" placeholder="Search channels..." autocomplete="off">
        </div>
        <div class="groups" id="groups"></div>
        <div class="channel-list" id="channelList"></div>
      </aside>

      <section class="player-section">
        <div class="video-container">
          <video id="video" controls playsinline crossorigin="anonymous"></video>
          <div class="placeholder" id="placeholder">
            <p>Select a channel to start watching</p>
          </div>
          <div class="loading" id="loading">
            <span class="spinner"></span>
            <p>Loading...</p>
          </div>
          <div class="error" id="error"></div>
        </div>
        <div class="now-playing" id="nowPlaying"></div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
